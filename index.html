<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KPI Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KPI">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --border: #38383a;
      --text: #f5f5f7;
      --muted: #8e8e93;
      --accent: #635bff;
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --r: 16px;
      --rs: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── VIEWS ── */
    .view { display: none; padding: 0 16px 110px; }
    .view.active { display: block; }

    /* ── HEADER ── */
    .hdr {
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 0 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .hdr h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .hdr .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .day-nav { display: flex; align-items: center; gap: 10px; }
    .day-nav h1 { flex: 1; }
    .day-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); width: 34px; height: 34px; border-radius: 10px;
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .2s;
    }
    .day-btn:active { opacity: .6; }
    .day-btn:disabled { opacity: .25; pointer-events: none; }

    /* ── NAV ── */
    .nav {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(18,18,20,0.9);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none;
      color: var(--muted); font-size: 10px; font-weight: 500;
      cursor: pointer; padding: 4px 0;
      transition: color .2s;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }

    /* ── SUMMARY CARD ── */
    .summary-card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .summary-text { flex: 1; }
    .summary-pct { font-size: 42px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
    .summary-label { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .summary-badges { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 100px;
      background: var(--surface2);
      color: var(--muted);
    }
    .badge.done { background: rgba(48,209,88,.15); color: var(--green); }
    .badge.skip { background: rgba(142,142,147,.15); color: var(--muted); }

    /* ── BIG RING ── */
    .big-ring { flex-shrink: 0; }

    /* ── KPI CARDS ── */
    .kpi-grid { display: flex; flex-direction: column; gap: 10px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: transform .15s, background .15s;
      -webkit-user-select: none; user-select: none;
    }
    .kpi-card:active { transform: scale(0.98); background: var(--surface2); }
    .kpi-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .kpi-body { flex: 1; min-width: 0; }
    .kpi-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-val { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .prog-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .kpi-right { text-align: right; flex-shrink: 0; }
    .kpi-pct { font-size: 20px; font-weight: 700; }
    .kpi-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .kpi-card.skipped { opacity: .55; }
    .kpi-skip-btn {
      background: var(--surface2); border: none;
      width: 28px; height: 28px; border-radius: 9px;
      color: var(--muted); font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; transition: all .15s;
    }
    .kpi-skip-btn:active { transform: scale(.9); }
    .kpi-skip-btn.active { background: rgba(255,69,58,.18); color: var(--red); }
    .skip-day-btn {
      width: 100%; margin-top: 12px; padding: 10px;
      border-radius: var(--rs); border: 1px dashed var(--border);
      background: none; color: var(--muted);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all .15s;
    }
    .skip-day-btn.active {
      border-style: solid; border-color: var(--red);
      color: var(--red); background: rgba(255,69,58,.08);
    }

    /* ── PERIOD TOGGLE ── */
    .period-toggle {
      display: flex; background: var(--surface);
      border-radius: var(--rs); padding: 4px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .period-btn {
      flex: 1; background: none; border: none;
      color: var(--muted); font-size: 14px; font-weight: 500;
      padding: 8px; border-radius: 7px; cursor: pointer;
      transition: all .2s;
    }
    .period-btn.active { background: var(--accent); color: #fff; }

    /* ── SEGMENTED (form) ── */
    .seg {
      display: flex; background: var(--surface2);
      border-radius: var(--rs); padding: 3px; gap: 3px;
      border: 1px solid var(--border);
    }
    .seg-btn {
      flex: 1; background: none; border: none;
      color: var(--muted); font-size: 12px; font-weight: 600;
      padding: 9px 4px; border-radius: 7px; cursor: pointer;
      transition: all .2s;
    }
    .seg-btn.active { background: var(--accent); color: #fff; }

    /* ── TIME LOG ── */
    .time-row { display: flex; align-items: center; gap: 8px; }
    .time-row .big-inp { flex: 1; min-width: 0; }
    .time-colon { font-size: 40px; font-weight: 700; color: var(--muted); }
    .check-row { display: flex; gap: 12px; margin-top: 8px; }
    .check-row .btn { margin-top: 0; }

    /* ── CHART CARD ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px; margin-bottom: 14px;
    }
    .chart-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height .4s ease; }
    .bar.bar-skip {
      background: repeating-linear-gradient(45deg, var(--surface2), var(--surface2) 3px, var(--border) 3px, var(--border) 6px) !important;
    }
    .bar-lbl { font-size: 9px; color: var(--muted); }
    .today-bar { outline: 2px solid rgba(255,255,255,.25); outline-offset: 1px; border-radius: 4px 4px 0 0; }
    .chart-avg {
      display: flex; justify-content: space-between;
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .chart-avg .label { color: var(--muted); }
    .chart-avg .val { font-weight: 700; }

    /* ── MANAGE ── */
    .manage-list { display: flex; flex-direction: column; gap: 10px; }
    .manage-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .manage-icon { font-size: 26px; width: 44px; text-align: center; flex-shrink: 0; }
    .manage-info { flex: 1; }
    .manage-name { font-size: 15px; font-weight: 600; }
    .manage-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .manage-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
    }
    .manage-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: var(--surface2); border: none;
      border-radius: 9px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); transition: color .2s;
    }
    .icon-btn:active { opacity: .7; }
    .icon-btn.del { color: var(--red); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(74px + env(safe-area-inset-bottom, 0px));
      right: max(16px, calc(50vw - 215px + 16px));
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 50%; border: none;
      color: #fff; font-size: 26px; line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(99,91,255,.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s; z-index: 50;
    }
    .fab:active { transform: scale(.94); }

    /* ── OVERLAY / SHEET ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 200; display: none;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .sheet {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 0 20px calc(20px + env(safe-area-inset-bottom, 0px));
      animation: slideUp .28s cubic-bezier(.32,1,.3,1);
      max-height: 92vh; overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 14px auto 20px;
    }
    .sheet h2 { font-size: 20px; font-weight: 700; margin-bottom: 18px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 14px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-lbl { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
    .form-inp {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--rs); color: var(--text);
      font-size: 16px; padding: 11px 13px;
      outline: none; transition: border-color .2s;
      -webkit-appearance: none; appearance: none;
    }
    .form-inp:focus { border-color: var(--accent); }
    .inp-wrap { position: relative; }
    .inp-unit {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 13px;
      pointer-events: none;
    }
    .inp-wrap .form-inp { padding-right: 50px; }

    .big-inp {
      font-size: 48px; font-weight: 700;
      text-align: center; padding: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--rs); color: var(--text);
      width: 100%; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .big-inp:focus { border-color: var(--accent); }

    .btn {
      width: 100%; border: none; border-radius: var(--rs);
      font-size: 16px; font-weight: 600;
      padding: 14px; cursor: pointer;
      transition: opacity .2s; margin-top: 8px;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }

    /* ── COLORS ── */
    .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .swatch {
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent;
      transition: border-color .15s, transform .15s;
    }
    .swatch.sel { border-color: #fff; transform: scale(1.1); }
    .swatch:active { transform: scale(.95); }

    /* ── LOG SHEET ── */
    .log-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .log-kpi-name { font-size: 20px; font-weight: 700; }
    .log-target-lbl { font-size: 13px; color: var(--muted); }
    .log-unit-big { text-align: center; color: var(--muted); font-size: 14px; margin: 8px 0 0; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .ei { font-size: 44px; margin-bottom: 10px; }
    .empty p { font-size: 14px; line-height: 1.5; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(90px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text); padding: 10px 18px;
      border-radius: 100px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: all .25s; z-index: 400;
      white-space: nowrap; pointer-events: none;
    }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

<!-- ── VIEWS ── -->
<div id="view-today" class="view active"></div>
<div id="view-stats" class="view"></div>
<div id="view-manage" class="view"></div>

<!-- ── BOTTOM NAV ── -->
<nav class="nav">
  <button class="nav-btn active" data-view="today" onclick="go('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Oggi
  </button>
  <button class="nav-btn" data-view="stats" onclick="go('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Statistiche
  </button>
  <button class="nav-btn" data-view="manage" onclick="go('manage')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
    Gestione
  </button>
</nav>

<!-- ── FAB ── -->
<button class="fab" id="fab" style="display:none" onclick="openEditKPI(null)">+</button>

<!-- ── LOG OVERLAY ── -->
<div class="overlay" id="ov-log" onclick="bgClose(event,'ov-log')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="log-meta">
      <div>
        <div class="log-kpi-name" id="log-name"></div>
        <div class="log-target-lbl" id="log-target-lbl"></div>
      </div>
      <div id="log-ring"></div>
    </div>
    <input type="number" id="log-inp" class="big-inp" min="0" step="0.5" inputmode="decimal" placeholder="0">
    <div class="time-row" id="log-time-row" style="display:none">
      <input type="number" id="log-inp-h" class="big-inp" min="0" inputmode="numeric" placeholder="0">
      <span class="time-colon">:</span>
      <input type="number" id="log-inp-m" class="big-inp" min="0" max="59" inputmode="numeric" placeholder="00">
    </div>
    <div class="check-row" id="log-check-row" style="display:none">
      <button class="btn" style="background:rgba(48,209,88,.18);color:var(--green)" onclick="saveCheck(1)">✓ Fatto</button>
      <button class="btn" style="background:rgba(255,69,58,.15);color:var(--red)" onclick="saveCheck(0)">✗ Non fatto</button>
    </div>
    <div class="log-unit-big" id="log-unit-lbl"></div>
    <button class="btn btn-primary" id="log-save-btn" onclick="saveLog()">Salva</button>
    <button class="btn btn-ghost" onclick="close_('ov-log')">Annulla</button>
  </div>
</div>

<!-- ── KPI EDIT OVERLAY ── -->
<div class="overlay" id="ov-kpi" onclick="bgClose(event,'ov-kpi')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="kpi-modal-title">Nuovo KPI</h2>
    <div class="form-group">
      <label class="form-lbl">Nome</label>
      <input type="text" id="ki-name" class="form-inp" placeholder="Es. Ore di Lettura">
    </div>
    <div class="form-group">
      <label class="form-lbl">Tipo di misura</label>
      <div class="seg" id="ki-type-seg">
        <button class="seg-btn" data-t="number" onclick="setKpiType('number')">Numero</button>
        <button class="seg-btn" data-t="time" onclick="setKpiType('time')">Tempo hh:mm</button>
        <button class="seg-btn" data-t="check" onclick="setKpiType('check')">Fatto / No</button>
      </div>
    </div>
    <div class="form-group" id="ki-mode-group">
      <label class="form-lbl">Tipo di obiettivo</label>
      <div class="seg" id="ki-mode-seg">
        <button class="seg-btn" data-m="atleast" onclick="setKpiMode('atleast')">Raggiungere almeno</button>
        <button class="seg-btn" data-m="atmost" onclick="setKpiMode('atmost')">Stare sotto</button>
      </div>
    </div>
    <div class="form-row" id="ki-row-num">
      <div class="form-group">
        <label class="form-lbl">Unità</label>
        <input type="text" id="ki-unit" class="form-inp" placeholder="ore, min, km…">
      </div>
      <div class="form-group">
        <label class="form-lbl">Obiettivo</label>
        <div class="inp-wrap">
          <input type="number" id="ki-target" class="form-inp" placeholder="8" min="0" step="0.5" inputmode="decimal">
          <span class="inp-unit" id="ki-unit-hint"></span>
        </div>
      </div>
    </div>
    <div class="form-row" id="ki-row-time" style="display:none">
      <div class="form-group">
        <label class="form-lbl">Obiettivo: ore</label>
        <input type="number" id="ki-target-h" class="form-inp" placeholder="1" min="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-lbl">Minuti</label>
        <input type="number" id="ki-target-m" class="form-inp" placeholder="30" min="0" max="59" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label class="form-lbl">Icona (emoji)</label>
      <input type="text" id="ki-icon" class="form-inp" placeholder="📊" maxlength="4">
    </div>
    <div class="form-group">
      <label class="form-lbl">Colore</label>
      <div class="swatch-row" id="swatch-row"></div>
      <input type="hidden" id="ki-color">
    </div>
    <button class="btn btn-primary" onclick="saveKPI()">Salva</button>
    <button class="btn btn-ghost" onclick="close_('ov-kpi')">Annulla</button>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const SK = 'kpi_v2';

const DEFAULTS = [
  { id:'sleep',    name:'Ore di Sonno',  unit:'ore', target:8,  icon:'😴', color:'#30d158' },
  { id:'study',    name:'Ore di Studio', unit:'ore', target:8,  icon:'📚', color:'#635bff' },
  { id:'training', name:'Allenamento',   unit:'min', target:60, icon:'💪', color:'#ff6584' },
];

const COLORS = ['#635bff','#ff6584','#30d158','#ff9f0a','#0ea5e9','#f59e0b','#ec4899','#06b6d4'];

function load() {
  let data = { kpis: DEFAULTS, logs: {}, daySkips: {}, kpiSkips: {} };
  try { const s = localStorage.getItem(SK); if (s) data = JSON.parse(s); } catch(e){}
  // migrazione: i KPI creati prima dell'introduzione di type/mode sono numerici "almeno"
  data.kpis.forEach(k => {
    if (!k.type) k.type = 'number';
    if (!k.mode) k.mode = 'atleast';
    // migrazione: i KPI creati prima del campo createdAt contavano già da sempre
    if (!k.createdAt) k.createdAt = '1970-01-01';
  });
  if (!data.daySkips) data.daySkips = {};
  if (!data.kpiSkips) data.kpiSkips = {};
  return data;
}
function save() { localStorage.setItem(SK, JSON.stringify(S)); }

let S = load();
let view = 'today', period = 'week', editId = null, logKpi = null;
let kpiType = 'number', kpiMode = 'atleast';

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
const today = () => new Date().toISOString().slice(0,10);

function daysBack(n) {
  return Array.from({length:n}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (n-1-i));
    return d.toISOString().slice(0,10);
  });
}

function getLog(date, id) { return S.logs[date]?.[id] ?? null; }

function setLog(date, id, v) {
  if (!S.logs[date]) S.logs[date] = {};
  S.logs[date][id] = v; save();
}

function isDaySkipped(date) { return !!S.daySkips[date]; }

function toggleDaySkip(date) {
  if (S.daySkips[date]) delete S.daySkips[date];
  else S.daySkips[date] = true;
  save();
}

function isKpiSkipped(date, id) { return !!(S.kpiSkips[date] && S.kpiSkips[date][id]); }

function toggleKpiSkip(date, id) {
  if (!S.kpiSkips[date]) S.kpiSkips[date] = {};
  if (S.kpiSkips[date][id]) delete S.kpiSkips[date][id];
  else S.kpiSkips[date][id] = true;
  if (!Object.keys(S.kpiSkips[date]).length) delete S.kpiSkips[date];
  save();
}

function completion(kpi, date) {
  const v = getLog(date, kpi.id);
  if (v === null) return 0;
  if (kpi.type === 'check') return v ? 1 : 0;
  if (kpi.mode === 'atmost') return v <= kpi.target ? 1 : Math.min(kpi.target / v, 1);
  return Math.min(v / kpi.target, 1);
}

function fmtHM(min) {
  min = Math.max(0, Math.round(min));
  return Math.floor(min/60) + ':' + String(min%60).padStart(2,'0');
}

function targetStr(kpi) {
  if (kpi.type === 'check') return 'da fare';
  const pre = kpi.mode === 'atmost' ? '≤ ' : '';
  return kpi.type === 'time' ? pre + fmtHM(kpi.target) : pre + kpi.target + ' ' + kpi.unit;
}

function valStr(kpi, v) {
  if (kpi.type === 'check') return v ? 'Fatto ✓' : 'Non fatto';
  return (kpi.type === 'time' ? fmtHM(v) : v) + ' / ' + targetStr(kpi);
}

function kpiExistsOn(kpi, date) { return date >= kpi.createdAt; }

function dayPct(date) {
  if (isDaySkipped(date)) return null;
  const active = S.kpis.filter(k => kpiExistsOn(k, date) && !isKpiSkipped(date, k.id));
  if (!active.length) return null;
  return active.reduce((a, k) => a + completion(k, date), 0) / active.length;
}

function pctColor(p) { return p >= .8 ? 'var(--green)' : p >= .5 ? 'var(--orange)' : 'var(--red)'; }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function itDay(date) {
  return new Date(date+'T12:00:00').toLocaleDateString('it-IT',{weekday:'short'}).slice(0,2);
}

/* ════════════════════════════════════════
   SVG RINGS
════════════════════════════════════════ */
function ring(size, stroke, pct, color, bg='var(--surface2)') {
  const r = (size - stroke) / 2;
  const cx = size/2, cy = size/2;
  const circ = 2*Math.PI*r;
  const off = circ*(1-pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bg}" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
  </svg>`;
}

/* ════════════════════════════════════════
   RENDER TODAY
════════════════════════════════════════ */
let selDate = today();

function shiftDay(n) {
  const d = new Date(selDate + 'T12:00:00');
  d.setDate(d.getDate() + n);
  const iso = d.toISOString().slice(0,10);
  if (iso > today()) return;
  selDate = iso;
  renderToday();
}

function toggleDaySkipUI(date) {
  toggleDaySkip(date);
  renderToday();
  if (view==='stats') renderStats();
}

function toggleKpiSkipUI(e, id) {
  e.stopPropagation();
  toggleKpiSkip(selDate, id);
  renderToday();
  if (view==='stats') renderStats();
}

function renderToday() {
  if (selDate > today()) selDate = today();
  const d = selDate;
  const isToday = d === today();
  const y = new Date(); y.setDate(y.getDate()-1);
  const isYest = d === y.toISOString().slice(0,10);
  let title = isToday ? 'Oggi' : isYest ? 'Ieri'
    : new Date(d+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long'});
  title = title.charAt(0).toUpperCase() + title.slice(1);
  const daySkipped = isDaySkipped(d);
  const ov = dayPct(d);
  const color = ov === null ? 'var(--muted)' : pctColor(ov);
  const dateStr = new Date(d+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  const dayKpis = S.kpis.filter(k => kpiExistsOn(k, d));

  const badges = dayKpis.map(k => {
    const skipped = daySkipped || isKpiSkipped(d, k.id);
    if (skipped) return `<span class="badge skip">${k.icon} ⏭ saltato</span>`;
    const c = completion(k,d);
    return `<span class="badge ${c>=1?'done':''}">${k.icon} ${Math.round(c*100)}%</span>`;
  }).join('');

  const summaryCard = `
    <div class="summary-card">
      <div class="summary-text">
        <div class="summary-pct" style="color:${color}">${ov === null ? '—' : Math.round(ov*100)+'%'}</div>
        <div class="summary-label">${daySkipped ? 'giornata saltata' : ov === null ? 'nessun KPI conteggiato' : 'completato ' + (isToday ? 'oggi' : isYest ? 'ieri' : '')}</div>
        <div class="summary-badges">${badges}</div>
      </div>
      <div class="big-ring">${ring(100,9,ov ?? 0,color)}</div>
    </div>`;

  const skipDayBtn = `
    <button class="skip-day-btn ${daySkipped?'active':''}" onclick="toggleDaySkipUI('${d}')">
      ${daySkipped ? '🏖 Giornata saltata — tocca per riattivare' : '🏖 Salta questa giornata (es. vacanza)'}
    </button>`;

  const cards = dayKpis.map(kpi => {
    const skipped = daySkipped || isKpiSkipped(d, kpi.id);
    const c = completion(kpi, d);
    const v = getLog(d, kpi.id);
    const col = kpi.color;
    return `
      <div class="kpi-card ${skipped?'skipped':''}" onclick="openLog('${kpi.id}')">
        <div class="kpi-icon-wrap" style="background:${col}22">${kpi.icon}</div>
        <div class="kpi-body">
          <div class="kpi-name">${kpi.name}</div>
          <div class="kpi-val">${skipped ? 'Saltato — non conteggiato' : v !== null ? valStr(kpi, v) : 'Tocca per registrare'}</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${skipped?0:c*100}%;background:${col}"></div></div>
        </div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:${skipped?'var(--muted)':col}">${skipped ? '–' : Math.round(c*100)+'%'}</div>
          <div class="kpi-hint">${skipped ? 'saltato' : c>=1?'✓ ok':targetStr(kpi)}</div>
        </div>
        <button class="kpi-skip-btn ${isKpiSkipped(d,kpi.id)?'active':''}" onclick="toggleKpiSkipUI(event,'${kpi.id}')" title="Salta questo KPI per oggi">${isKpiSkipped(d,kpi.id)?'↩':'⏭'}</button>
      </div>`;
  }).join('');

  document.getElementById('view-today').innerHTML = `
    <div class="hdr">
      <div class="day-nav">
        <button class="day-btn" onclick="shiftDay(-1)" title="Giorno precedente">‹</button>
        <h1>${title}</h1>
        <button class="day-btn" onclick="shiftDay(1)" ${isToday?'disabled':''} title="Giorno successivo">›</button>
      </div>
      <div class="sub">${dateStr}</div>
      ${dayKpis.length ? skipDayBtn : ''}
    </div>
    ${dayKpis.length ? summaryCard + '<div class="kpi-grid">'+cards+'</div>'
      : S.kpis.length ? '<div class="empty"><div class="ei">🗓️</div><p>Nessun KPI esisteva ancora in questo giorno.</p></div>'
      : '<div class="empty"><div class="ei">📊</div><p>Nessun KPI configurato.<br>Vai in Gestione per aggiungerne uno.</p></div>'}`;
}

/* ════════════════════════════════════════
   RENDER STATS
════════════════════════════════════════ */
function renderStats() {
  const days = daysBack(period === 'week' ? 7 : 30);
  const td = today();

  const overallBars = days.map((d, i) => {
    const dp = dayPct(d);
    const lbl = period==='week' ? itDay(d) : (i%5===0 ? new Date(d+'T12:00:00').getDate() : '');
    const isTod = d===td;
    if (dp === null) {
      return `<div class="bar-col">
        <div class="bar bar-skip ${isTod?'today-bar':''}" style="height:30%" title="Saltato"></div>
        <span class="bar-lbl">${lbl}</span>
      </div>`;
    }
    const p = dp*100;
    const col = p>=80?'var(--green)':p>=50?'var(--orange)':p>0?'var(--red)':'var(--border)';
    return `<div class="bar-col">
      <div class="bar ${isTod?'today-bar':''}" style="height:${Math.max(p,3)}%;background:${col}"></div>
      <span class="bar-lbl">${lbl}</span>
    </div>`;
  }).join('');

  const validDayPcts = days.map(d=>dayPct(d)).filter(p=>p!==null);
  const avgAll = validDayPcts.length ? validDayPcts.reduce((a,b)=>a+b*100,0)/validDayPcts.length : null;

  const kpiCards = S.kpis.map(kpi => {
    const validVals = [];
    const bars = days.map((d,i) => {
      const lbl = period==='week' ? itDay(days[i]) : (i%5===0 ? new Date(days[i]+'T12:00:00').getDate() : '');
      const isTod = d===td;
      if (!kpiExistsOn(kpi, d)) {
        return `<div class="bar-col">
          <div class="bar bar-skip ${isTod?'today-bar':''}" style="height:30%" title="Non ancora creato"></div>
          <span class="bar-lbl">${lbl}</span>
        </div>`;
      }
      if (isDaySkipped(d) || isKpiSkipped(d, kpi.id)) {
        return `<div class="bar-col">
          <div class="bar bar-skip ${isTod?'today-bar':''}" style="height:30%" title="Saltato"></div>
          <span class="bar-lbl">${lbl}</span>
        </div>`;
      }
      const v = completion(kpi,d)*100;
      validVals.push(v);
      return `<div class="bar-col">
        <div class="bar ${isTod?'today-bar':''}" style="height:${Math.max(v,3)}%;background:${kpi.color};opacity:${isTod?1:.75}"></div>
        <span class="bar-lbl">${lbl}</span>
      </div>`;
    }).join('');
    const avg = validVals.length ? validVals.reduce((a,b)=>a+b,0)/validVals.length : null;
    return `
      <div class="chart-card">
        <div class="chart-title">${kpi.icon} ${kpi.name}</div>
        <div class="bar-chart">${bars}</div>
        <div class="chart-avg">
          <span class="label">Media periodo</span>
          <span class="val" style="color:${avg===null?'var(--muted)':kpi.color}">${avg===null?'–':Math.round(avg)+'%'}</span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('view-stats').innerHTML = `
    <div class="hdr"><h1>Statistiche</h1></div>
    <div class="period-toggle">
      <button class="period-btn ${period==='week'?'active':''}" onclick="setPeriod('week')">Settimana</button>
      <button class="period-btn ${period==='month'?'active':''}" onclick="setPeriod('month')">Mese</button>
    </div>
    <div class="chart-card">
      <div class="chart-title">Completamento giornaliero</div>
      <div class="bar-chart">${overallBars}</div>
      <div class="chart-avg">
        <span class="label">Media periodo</span>
        <span class="val" style="color:${avgAll===null?'var(--muted)':pctColor(avgAll/100)}">${avgAll===null?'–':Math.round(avgAll)+'%'}</span>
      </div>
    </div>
    ${S.kpis.length ? kpiCards : ''}`;
}

/* ════════════════════════════════════════
   RENDER MANAGE
════════════════════════════════════════ */
function renderManage() {
  const items = S.kpis.map(kpi => `
    <div class="manage-item">
      <div class="manage-icon">${kpi.icon}</div>
      <div class="manage-info">
        <div class="manage-name">${kpi.name}</div>
        <div class="manage-meta">
          <span class="manage-dot" style="background:${kpi.color}"></span>
          ${kpi.type==='check' ? 'Fatto / Non fatto' : 'Obiettivo: ' + targetStr(kpi)}
        </div>
      </div>
      <div class="manage-actions">
        <button class="icon-btn" onclick="openEditKPI('${kpi.id}')" title="Modifica">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="icon-btn del" onclick="deleteKPI('${kpi.id}')" title="Elimina">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>`).join('');

  document.getElementById('view-manage').innerHTML = `
    <div class="hdr">
      <h1>I miei KPI</h1>
      <div class="sub">${S.kpis.length} indicatori • tocca + per aggiungerne</div>
    </div>
    ${S.kpis.length
      ? '<div class="manage-list">'+items+'</div>'
      : '<div class="empty"><div class="ei">➕</div><p>Nessun KPI ancora.<br>Tocca il + in basso a destra.</p></div>'}`;
}

/* ════════════════════════════════════════
   LOG MODAL
════════════════════════════════════════ */
function openLog(id) {
  const kpi = S.kpis.find(k => k.id===id);
  if (!kpi) return;
  logKpi = kpi;
  const cur = getLog(selDate, id);
  const isNum = kpi.type === 'number';
  document.getElementById('log-name').textContent = kpi.icon+' '+kpi.name;
  document.getElementById('log-target-lbl').textContent =
    kpi.type==='check' ? 'Fatto / Non fatto' : 'Obiettivo: '+targetStr(kpi);
  document.getElementById('log-inp').style.display = isNum ? '' : 'none';
  document.getElementById('log-unit-lbl').style.display = isNum ? '' : 'none';
  document.getElementById('log-time-row').style.display = kpi.type==='time' ? 'flex' : 'none';
  document.getElementById('log-check-row').style.display = kpi.type==='check' ? 'flex' : 'none';
  document.getElementById('log-save-btn').style.display = kpi.type==='check' ? 'none' : '';
  if (isNum) {
    document.getElementById('log-unit-lbl').textContent = kpi.unit;
    document.getElementById('log-inp').value = cur !== null ? cur : '';
    document.getElementById('log-inp').placeholder = kpi.target;
  } else if (kpi.type === 'time') {
    document.getElementById('log-inp-h').value = cur !== null ? Math.floor(cur/60) : '';
    document.getElementById('log-inp-m').value = cur !== null ? cur%60 : '';
    document.getElementById('log-inp-h').placeholder = Math.floor(kpi.target/60);
    document.getElementById('log-inp-m').placeholder = String(kpi.target%60).padStart(2,'0');
  }
  document.getElementById('log-ring').innerHTML = ring(60, 6, completion(kpi, selDate), kpi.color);
  open_('ov-log');
  if (isNum) setTimeout(()=>document.getElementById('log-inp').focus(), 300);
  else if (kpi.type==='time') setTimeout(()=>document.getElementById('log-inp-h').focus(), 300);
}

function saveLog() {
  let v;
  if (logKpi.type === 'time') {
    const h = parseInt(document.getElementById('log-inp-h').value) || 0;
    const m = parseInt(document.getElementById('log-inp-m').value) || 0;
    if (h < 0 || m < 0 || m > 59) { toast('Minuti tra 0 e 59'); return; }
    v = h*60 + m;
  } else {
    v = parseFloat(document.getElementById('log-inp').value);
    if (isNaN(v) || v < 0) { toast('Inserisci un valore valido'); return; }
  }
  setLog(selDate, logKpi.id, v);
  close_('ov-log');
  renderToday();
  if (view==='stats') renderStats();
  toast('Salvato ✓');
}

function saveCheck(v) {
  setLog(selDate, logKpi.id, v);
  close_('ov-log');
  renderToday();
  if (view==='stats') renderStats();
  toast('Salvato ✓');
}

/* ════════════════════════════════════════
   KPI MODAL
════════════════════════════════════════ */
function openEditKPI(id) {
  editId = id;
  const kpi = id ? S.kpis.find(k=>k.id===id)
    : {name:'',unit:'',target:'',icon:'📊',color:COLORS[0],type:'number',mode:'atleast'};
  document.getElementById('kpi-modal-title').textContent = id ? 'Modifica KPI' : 'Nuovo KPI';
  document.getElementById('ki-name').value   = kpi.name;
  document.getElementById('ki-unit').value   = kpi.type==='time' ? '' : kpi.unit;
  document.getElementById('ki-target').value = kpi.type==='number' ? (kpi.target||'') : '';
  document.getElementById('ki-target-h').value = kpi.type==='time' && kpi.target ? Math.floor(kpi.target/60) : '';
  document.getElementById('ki-target-m').value = kpi.type==='time' && kpi.target ? kpi.target%60 : '';
  document.getElementById('ki-icon').value   = kpi.icon;
  document.getElementById('ki-color').value  = kpi.color;
  document.getElementById('ki-unit-hint').textContent = kpi.unit;
  document.getElementById('ki-unit').oninput = e => {
    document.getElementById('ki-unit-hint').textContent = e.target.value;
  };
  setKpiType(kpi.type || 'number');
  setKpiMode(kpi.mode || 'atleast');
  renderSwatches(kpi.color);
  open_('ov-kpi');
}

function setKpiType(t) {
  kpiType = t;
  document.querySelectorAll('#ki-type-seg .seg-btn').forEach(b=>b.classList.toggle('active', b.dataset.t===t));
  document.getElementById('ki-row-num').style.display  = t==='number' ? 'flex' : 'none';
  document.getElementById('ki-row-time').style.display = t==='time'   ? 'flex' : 'none';
  document.getElementById('ki-mode-group').style.display = t==='check' ? 'none' : '';
}

function setKpiMode(m) {
  kpiMode = m;
  document.querySelectorAll('#ki-mode-seg .seg-btn').forEach(b=>b.classList.toggle('active', b.dataset.m===m));
}

function renderSwatches(sel) {
  document.getElementById('swatch-row').innerHTML = COLORS.map(c=>
    `<div class="swatch ${c===sel?'sel':''}" style="background:${c}" data-c="${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) {
  document.getElementById('ki-color').value = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('sel', s.dataset.c===c));
}

function saveKPI() {
  const name   = document.getElementById('ki-name').value.trim();
  const icon   = document.getElementById('ki-icon').value.trim() || '📊';
  const color  = document.getElementById('ki-color').value || COLORS[0];
  const type   = kpiType;
  const mode   = type==='check' ? 'atleast' : kpiMode;
  let unit, target;
  if (!name) { toast('Inserisci un nome'); return; }
  if (type === 'check') {
    unit = ''; target = 1;
  } else if (type === 'time') {
    const h = parseInt(document.getElementById('ki-target-h').value) || 0;
    const m = parseInt(document.getElementById('ki-target-m').value) || 0;
    if (h < 0 || m < 0 || m > 59) { toast('Minuti tra 0 e 59'); return; }
    target = h*60 + m; unit = 'hh:mm';
    if (target <= 0) { toast('Obiettivo non valido'); return; }
  } else {
    unit   = document.getElementById('ki-unit').value.trim();
    target = parseFloat(document.getElementById('ki-target').value);
    if (!unit) { toast("Inserisci l'unità"); return; }
    if (isNaN(target)||target<=0) { toast('Obiettivo non valido'); return; }
  }
  if (editId) {
    const i = S.kpis.findIndex(k=>k.id===editId);
    S.kpis[i] = {...S.kpis[i], name, unit, target, icon, color, type, mode};
  } else {
    S.kpis.push({id:uid(), name, unit, target, icon, color, type, mode, createdAt: today()});
  }
  save(); close_('ov-kpi'); renderManage(); renderToday();
  toast(editId ? 'KPI aggiornato' : 'KPI aggiunto ✓');
}

function deleteKPI(id) {
  if (!confirm('Eliminare questo KPI e tutti i relativi dati?')) return;
  S.kpis = S.kpis.filter(k=>k.id!==id);
  Object.values(S.logs).forEach(d=>delete d[id]);
  Object.entries(S.kpiSkips).forEach(([date, ids]) => {
    delete ids[id];
    if (!Object.keys(ids).length) delete S.kpiSkips[date];
  });
  save(); renderManage(); renderToday();
  toast('KPI eliminato');
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function go(v) {
  view = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  document.getElementById('fab').style.display = v==='manage' ? 'flex' : 'none';
  if (v==='today')  renderToday();
  if (v==='stats')  renderStats();
  if (v==='manage') renderManage();
}

function setPeriod(p) { period=p; renderStats(); }

/* ════════════════════════════════════════
   OVERLAY HELPERS
════════════════════════════════════════ */
function open_(id)  { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function close_(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function bgClose(e, id) { if(e.target===e.currentTarget) close_(id); }

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(tt); tt = setTimeout(()=>el.classList.remove('on'), 2200);
}

/* ════════════════════════════════════════
   SERVICE WORKER
════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
renderToday();
</script>
</body>
</html>
